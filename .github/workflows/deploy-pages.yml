name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Flutter installieren
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Web-Unterstützung erzeugen
        run: |
          flutter config --enable-web
          flutter create . --platforms=web --project-name whats_in_my_fridge

      - name: Abhängigkeiten installieren
        run: flutter pub get

      - name: Web-App bauen
        shell: bash
        run: |
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
          flutter build web --release --base-href "/${REPOSITORY_NAME}/"
          touch build/web/.nojekyll

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Website hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
