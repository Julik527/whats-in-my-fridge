name: whats_in_my_fridge
description: A smart food inventory, recipe, meal planning, and waste reduction app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

flutter:
  uses-material-design: true


dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.7.1
  firebase_storage: ^13.4.5
  firebase_messaging: ^16.4.3
  cloud_functions: ^6.3.5
  google_sign_in: ^7.2.0
  image_picker: ^1.2.3
  mobile_scanner: ^7.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

